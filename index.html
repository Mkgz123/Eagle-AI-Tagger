<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>AI Tagger</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- ====== 自定义标题栏 ====== -->
    <header id="title-bar">
        <div class="title-bar-left">
            <img src="logo.png" alt="Logo" class="title-logo" />
            <span class="title-text">AI Tagger</span>
        </div>
        <div class="title-bar-right">
            <button class="title-btn" id="btn-settings" title="设置">⚙</button>
            <button class="title-btn title-btn-close" id="btn-close" title="关闭">✕</button>
        </div>
    </header>

    <!-- ====== 主体区域 ====== -->
    <div id="main-container">
        <!-- 左侧：任务列表 -->
        <aside id="task-panel">
            <div class="panel-header">
                <span id="task-count" class="task-count"></span>
            </div>
            <div id="task-list" class="task-list">
                <div class="empty-hint">
                    <div class="empty-icon">📌</div>
                    <p>在 Eagle 中选择素材后<br/>将自动显示在此处</p>
                </div>
            </div>
        </aside>

        <!-- 右侧：功能区 -->
        <section id="action-panel">
            <div class="panel-header">
                <span id="action-count" class="task-count"></span>
            </div>
            <div id="action-list" class="action-list"></div>
            <div id="action-footer" class="action-footer hidden">
                <button class="btn btn-outline" id="btn-save-template">保存为模板</button>
                <button class="btn btn-outline" id="btn-load-template">加载模板</button>
                <button class="btn btn-primary" id="btn-execute">执行全部动作</button>
            </div>
        </section>
    </div>

    <!-- ====== 底部模板栏 ====== -->
    <footer id="template-bar">
        <span class="template-label">模板</span>
        <div id="template-list" class="template-list"></div>
    </footer>

    <!-- 模态框容器 -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="UI.closeModal()">✕</button>
            </div>
            <div id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <!-- JS 模块 -->
    <script src="js/utils.js"></script>
    <script src="js/settings-store.js"></script>
    <script src="js/template-store.js"></script>
    <script src="js/ai-service.js"></script>
    <script src="js/item-service.js"></script>
    <script src="js/folder-service.js"></script>
    <script src="js/tag-service.js"></script>
    <script src="js/app.js"></script>
    <script src="js/plugin.js"></script>
</body>
</html>
